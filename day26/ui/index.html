<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 26 - ReAct Agent</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef0ff 0%, #f7f8fc 100%);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 720px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(79,70,229,0.15);
    display: flex;
    flex-direction: column;
    height: 88vh;
    overflow: hidden;
  }
  header {
    padding: 20px 26px;
    background: linear-gradient(120deg, #4f46e5, #7c3aed);
    color: #fff;
  }
  header .title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  header .subtitle { font-size: 12.5px; opacity: 0.85; margin-top: 3px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; box-shadow: 0 0 6px #4ade80; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #fafbff;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-thumb { background: #d8d8f0; border-radius: 4px; }

  .row { display: flex; gap: 10px; align-items: flex-end; animation: rise 0.25s ease; }
  .row.user { flex-direction: row-reverse; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .avatar.user { background: #4f46e5; color: #fff; }
  .avatar.bot { background: #ede9fe; color: #6d28d9; }

  .msg {
    max-width: 75%;
    padding: 11px 15px;
    border-radius: 16px;
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 14.5px;
  }
  .user .msg { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
  .bot .msg { background: #fff; color: #222; border: 1px solid #ececf5; border-bottom-left-radius: 4px; }

  .typing { display: flex; gap: 4px; padding: 14px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #b3aef0;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }

  form {
    display: flex;
    gap: 10px;
    padding: 16px 22px;
    border-top: 1px solid #eee;
    background: #fff;
  }
  input {
    flex: 1;
    padding: 13px 16px;
    border: 1.5px solid #e2e2f0;
    border-radius: 24px;
    font-size: 14.5px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #4f46e5; }
  button {
    width: 46px; height: 46px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 17px;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
  }
  button:hover:not(:disabled) { background: #4338ca; transform: scale(1.06); }
  button:disabled { background: #c7c5ee; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="title"><span class="dot"></span> ReAct Agent</div>
    <div class="subtitle">calculator · web search · RAG (arXiv papers)</div>
  </header>
  <div id="chat"></div>
  <form id="form">
    <input type="text" id="question" placeholder="Ask anything..." autocomplete="off">
    <button type="submit" id="send">➤</button>
  </form>
</div>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("question");
const sendBtn = document.getElementById("send");

function addRow(text, who) {
  const row = document.createElement("div");
  row.className = "row " + who;

  const avatar = document.createElement("div");
  avatar.className = "avatar " + who;
  avatar.textContent = who === "user" ? "🙂" : "🤖";

  const msg = document.createElement("div");
  msg.className = "msg";
  msg.textContent = text;

  row.appendChild(avatar);
  row.appendChild(msg);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function addTyping() {
  const row = document.createElement("div");
  row.className = "row bot";
  row.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="msg typing"><span></span><span></span><span></span></div>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = input.value.trim();
  if (!q) return;

  addRow(q, "user");
  input.value = "";
  sendBtn.disabled = true;

  const typingRow = addTyping();

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    typingRow.remove();
    addRow(data.answer, "bot");
  } catch (err) {
    typingRow.remove();
    addRow("Error: could not reach the agent.", "bot");
  }

  sendBtn.disabled = false;
  input.focus();
});

input.focus();
</script>

</body>
</html>
